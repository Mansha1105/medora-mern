    <!-- Icon rounded square bg -->
    <rect x="-228" y="-42" width="84" height="84" rx="20" fill="#e8f4fb" style="fill:rgb(232, 244, 251);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

